<!doctype html>
<head>
  <meta charset="utf-8" />
  <title>Beoordeel links</title>
  <link rel="stylesheet" href="src/components/link-beoordeelaar.css" />
  <link rel="icon" href="https://fav.farm/🧑‍⚖️" />
</head>
<body>
  <div id="root">
    <div id="link-beoordelaar">
      <header class="colophon status-bar" data-status="ready">
        <div>
          <div class="progress-container" title="20% done of 5 links">
            <progress id="progress-dataset">Loading...</progress>
            <label for="progress-dataset">Loading...</label>
          </div>
        </div>
        <div>
          <a
            target="_blank"
            href="https://rdmr.eu/link-beoordeelaar/docs/help/enduser/en"
            rel="noopener noreferrer"
            >Help and Support</a
          >
        </div>
      </header>
      <main class="app">
        <div class="page page-centered">
          <header class="measure">
            <div class="">
              <h1>Loading ⏳</h1>
              <p>Loading questionnaire and connecting with remote database.</p>
            </div>
          </header>
          <main class="measure">
            <noscript>
              <h1>Critical error</h1>
              <h2>
                <code>dfc29c07-4fc7-41f7-9d56-8db988573511</code>
              </h2>
              <p>
                JavaScript is required, but turned off. Please turn it back on
                or whitelist this page.
              </p>
              <details>
                <summary>Why?</summary>
                <p>
                  This application (<a
                    target="_blank"
                    href="https://github.com/redmer/link-beoordeelaar"
                    >redmer/link-beoordeelaar</a
                  >) is a SPA without interactive backend.
                </p>
                <p>
                  That makes deployment easy to bootstrap, but does require
                  clients to have an up-to-date JavaScript runtime.
                </p>
              </details>
            </noscript>
          </main>
        </div>
      </main>
      <footer class="diagnostics">
        <details class="">
          <summary>Internals</summary>
          <code id="debug-diagnostics" class="overflow-x-scroll">
            <pre>Initial content</pre>
          </code>
        </details>
      </footer>
    </div>
  </div>
  <script type="module" src="./dist/bundle.min.js"></script>
</body>
