name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Assemble Pages source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _src
          # docs/ contains _config.yml so Jekyll renders the markdown files
          # with the Primer theme + default layout (matching the legacy
          # "Deploy from a branch" GitHub Pages experience).
          cp -r docs/. _src/
          cp -r schema _src/schema
          cp frontend/index.html _src/index.html
          cp -r frontend/dist _src/dist
          # Include CSS referenced from frontend/index.html
          # (src/components/link-beoordeelaar.css)
          mkdir -p _src/src/components
          cp frontend/src/components/link-beoordeelaar.css \
             _src/src/components/link-beoordeelaar.css

          # Jekyll only renders markdown files that have YAML front matter.
          # The legacy GitHub Pages pipeline added it implicitly; mirror that
          # by prepending empty front matter to any .md file that lacks it,
          # so they render as themed .html pages.
          while IFS= read -r -d '' f; do
            if ! head -n 1 "$f" | grep -qE '^---[[:space:]]*$'; then
              tmp="$(mktemp)"
              printf -- '---\n---\n' > "$tmp"
              cat "$f" >> "$tmp"
              mv "$tmp" "$f"
            fi
          done < <(find _src -type f -name '*.md' -print0)

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./_src
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
